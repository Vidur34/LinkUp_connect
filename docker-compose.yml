version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: festconnect_postgres
    environment:
      POSTGRES_USER: festuser
      POSTGRES_PASSWORD: festpass
      POSTGRES_DB: festconnect
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U festuser -d festconnect" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: festconnect_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: festconnect_backend
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql://festuser:festpass@postgres:5432/festconnect
      REDIS_URL: redis://redis:6379
    ports:
      - "5021:5021"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: festconnect_frontend
    environment:
      VITE_API_URL: http://localhost:5021/api
      VITE_SOCKET_URL: http://localhost:5021
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
  redis_data:
